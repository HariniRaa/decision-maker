<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delulu Checker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.03em;
  }

  header p {
    font-size: 0.85rem;
    color: #666;
    margin-top: 0.35rem;
  }

  #conversation {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .msg {
    max-width: 85%;
    padding: 0.85rem 1.1rem;
    border-radius: 1rem;
    line-height: 1.55;
    font-size: 0.95rem;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: #1a1a2e;
    color: #c8c8e0;
    border-bottom-right-radius: 0.3rem;
  }

  .msg.assistant {
    align-self: flex-start;
    background: #1a1a1a;
    color: #d4d4d4;
    border-bottom-left-radius: 0.3rem;
    border: 1px solid #222;
  }

  .msg.assistant.thinking {
    color: #555;
    font-style: italic;
  }

  #empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #333;
    font-size: 1.05rem;
    padding: 2rem;
    line-height: 1.6;
  }

  #input-bar {
    flex-shrink: 0;
    padding: 1rem;
    background: #0a0a0a;
    border-top: 1px solid #1a1a1a;
  }

  #input-bar form {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    gap: 0.6rem;
  }

  #input-bar textarea {
    flex: 1;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
    color: #e0e0e0;
    font-size: 0.95rem;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 2.75rem;
    max-height: 8rem;
    line-height: 1.4;
    transition: border-color 0.15s;
  }

  #input-bar textarea:focus {
    border-color: #444;
  }

  #input-bar textarea::placeholder {
    color: #444;
  }

  #input-bar button {
    align-self: flex-end;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 0.75rem;
    padding: 0.75rem 1.25rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  #input-bar button:hover { opacity: 0.85; }
  #input-bar button:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>Decision Buddy</h1>
  <p>Thought partner to help you dig deeper,and find gaps in your thought process, so you can make defensible decisions.Based on behavioural psychology principles. <p>
   
  </p> Because delulu is not always the solulu. </p>
</header>

<div id="empty-state">What decision are you facing?</div>
<div id="conversation" style="display:none"></div>

<div id="input-bar">
  <form id="chat-form">
    <textarea id="user-input" placeholder="I'm thinking about..." rows="1"></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
</div>

<script>
const convo = document.getElementById("conversation");
const empty = document.getElementById("empty-state");
const form = document.getElementById("chat-form");
const input = document.getElementById("user-input");
const btn = document.getElementById("send-btn");

let messages = [];

// Auto-resize textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 128) + "px";
});

// Enter to send, Shift+Enter for newline
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event("submit"));
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  // Show conversation, hide empty state
  empty.style.display = "none";
  convo.style.display = "flex";

  // Add user message
  messages.push({ role: "user", content: text });
  appendMsg("user", text);
  input.value = "";
  input.style.height = "auto";
  btn.disabled = true;

  // Show thinking indicator
  const thinking = appendMsg("assistant thinking", "Thinking...");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || "Something went wrong");
    }

    const data = await res.json();
    messages.push({ role: "assistant", content: data.content });

    thinking.remove();
    appendMsg("assistant", data.content);
  } catch (err) {
    thinking.remove();
    appendMsg("assistant", "Error: " + err.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
});

function appendMsg(cls, text) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  convo.appendChild(div);
  convo.scrollTop = convo.scrollHeight;
  return div;
}

input.focus();
</script>
</body>
</html>
